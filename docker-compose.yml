version: '3.8'

services:
  n8n:
    image: n8n-custom:latest
    container_name: n8n-final
    restart: always
    
    # 使用 root 用户以确保对 Windows 挂载点的读写权限，以及对 Chromium 的完全控制
    user: root
    
    ports:
      - "5678:5678"

    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      # 1. 核心目录与认证 (可选)
      - N8N_USER_FOLDER=/home/node/
      - N8N_COMMUNITY_PACKAGES_ENABLED=true
      
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Asia/Shanghai
      - TZ=Asia/Shanghai
      - N8N_RESTRICT_FILE_ACCESS_TO=/files
      
      # 2. 核心路径修复：强制读取镜像内置的 Debian 插件
      - NODE_PATH=/usr/local/lib/node_modules
      
      # 3. 浏览器路径：通过挂载对齐 root 路径，并使用全局 PATH 指向
      - PLAYWRIGHT_BROWSERS_PATH=/root/.cache/ms-playwright
      - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
      - PUPPETEER_EXECUTABLE_PATH=/usr/local/bin/chromium
      - PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH=/usr/local/bin/chromium
      
      # 4. 性能与执行引擎
      - NODE_OPTIONS=--max-old-space-size=4096
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      - N8N_PYTHON_BINARY=/usr/bin/python3
      
      # 5. 日志清理
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
      - EXECUTIONS_DATA_PRUNE_MAX_COUNT=10000

    volumes:
      # 精准挂载 n8n 数据目录 (工作流、数据库在此)
      - E:/docker/.n8n:/home/node/.n8n
      # 挂载业务数据目录
      - E:/docker/n8n_data:/files
      # 将浏览器持久化目录直接映射到 root 缓存（解决插件报错的核心）
      - E:/docker/.n8n/browsers:/root/.cache/ms-playwright
      # 初始化脚本
      - ./setup.sh:/usr/local/bin/setup-n8n:ro

    # 关键设置：解决浏览器沙盒渲染崩溃
    shm_size: '2gb'
    
    deploy:
      resources:
        limits:
          memory: 6G
          cpus: '2.0'

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s